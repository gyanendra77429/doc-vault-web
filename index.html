<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVault Pro | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #6366f1; --bg: #0f172a; --card: #1e293b;
            --text: #f8fafc; --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen Styles */
        #auth-body { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #4f46e5, #0f172a); }
        .login-card { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); padding: 2.5rem; border-radius: 24px; width: 400px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 2rem; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #94a3b8; cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .btn-main { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3); }

        /* Main App remains same as previous version but hidden initially */
        #app-body { display: none; height: 100vh; flex-direction: row; }
        /* (Baki CSS wahi hai jo pehle dashboard ke liye di thi) */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid rgba(255,255,255,0.1); padding: 2rem; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="auth-body">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="color: var(--accent);"><i data-lucide="shield-check"></i> DocVault Pro</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">Secure Document Storage</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuth('email', this)">Email</button>
                <button class="tab-btn" onclick="switchAuth('phone', this)">Phone</button>
            </div>

            <div id="email-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="emailInput" placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passInput" placeholder="••••••••">
                </div>
                <button class="btn-main" onclick="handleEmailLogin()"><i data-lucide="mail"></i> Login / Sign Up</button>
            </div>

            <div id="phone-form" style="display: none;">
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneInput" placeholder="+91 9876543210">
                </div>
                <div id="otp-section" style="display: none;">
                    <div class="input-group">
                        <label>Enter OTP</label>
                        <input type="text" id="otpInput" placeholder="6-digit code">
                    </div>
                </div>
                <button id="phoneBtn" class="btn-main" onclick="handlePhoneLogin()"><i data-lucide="phone"></i> Send OTP</button>
            </div>
        </div>
    </div>

    <div id="app-body">
       <div class="sidebar">
           <h2>DocVault</h2>
           <p onclick="location.reload()" style="cursor:pointer; color:red; margin-top:20px;">Logout</p>
       </div>
       <div class="main-content">
           <h1>Welcome to your Vault</h1>
           <p>Logged in successfully!</p>
       </div>
    </div>

    <script>
        lucide.createIcons();

        // Supabase Keys
        const SB_URL = "https://sazdnbsestnlwxogxnfd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemRuYnNlc3RubHd4b2d4bmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE0NzcsImV4cCI6MjA5MjQzNzQ3N30.erpQghV9yktpj1efrNMkgsTzY7ePJDYIZhU1E_3CHMs";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // UI Logic
        function switchAuth(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(type === 'email') {
                document.getElementById('email-form').style.display = 'block';
                document.getElementById('phone-form').style.display = 'none';
            } else {
                document.getElementById('email-form').style.display = 'none';
                document.getElementById('phone-form').style.display = 'block';
            }
        }

        // --- EMAIL LOGIN LOGIC ---
        async function handleEmailLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;

            // Try Login
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                // If account doesn't exist, try Signing Up
                const { error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) alert("Error: " + signUpError.message);
                else alert("Sign up successful! Please check your email for verification.");
            } else {
                enterApp();
            }
        }

        // --- PHONE LOGIN LOGIC ---
        let isOtpSent = false;
        async function handlePhoneLogin() {
            const phone = document.getElementById('phoneInput').value;
            
            if (!isOtpSent) {
                const { error } = await supabase.auth.signInWithOtp({ phone: phone });
                if (error) alert("Error: " + error.message);
                else {
                    isOtpSent = true;
                    document.getElementById('otp-section').style.display = 'block';
                    document.getElementById('phoneBtn').innerText = "Verify OTP";
                    alert("OTP sent to your phone!");
                }
            } else {
                const token = document.getElementById('otpInput').value;
                const { error } = await supabase.auth.verifyOtp({ phone, token, type: 'sms' });
                if (error) alert("Invalid OTP: " + error.message);
                else enterApp();
            }
        }

        function enterApp() {
            document.getElementById('auth-body').style.display = 'none';
            document.getElementById('app-body').style.display = 'flex';
        }
    </script>
</body>
</html>
