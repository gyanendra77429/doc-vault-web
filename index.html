<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocVault Luxe | Secured by Gyanendra Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #d4af37; --bg: #0a0c10; --card: #161a21; 
            --text: #ffffff; --gray: #94a3b8; --border: #262c36; --accent: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- PIN SCREEN --- */
        #pin-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-dot-container { display: flex; gap: 15px; margin-bottom: 40px; }
        .pin-dot { width: 15px; height: 15px; border: 2px solid var(--primary); border-radius: 50%; }
        .pin-dot.filled { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 280px; }
        .num-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--border); 
            background: var(--card); color: white; font-size: 1.5rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .num-btn:active { background: var(--primary); color: #000; transform: scale(0.9); }

        /* --- LAYOUT --- */
        #app-body { display: none; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .navbar { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 12, 16, 0.8); backdrop-filter: blur(15px); sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        
        /* --- SUPPORT MODAL --- */
        #support-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 10000; padding: 30px; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; }

        /* --- OTHER STYLES --- */
        .section { display: none; padding: 20px; }
        .section.active { display: block; }
        .premium-btn { background: linear-gradient(135deg, #d4af37, #f1d279); color: #000; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; }
        .tab-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(22, 26, 33, 0.95); border: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; border-radius: 30px; z-index: 1000; }
        .tab-btn { color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .tab-btn.active { color: var(--primary); }
        .file-card { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 18px; border-radius: 24px; margin-bottom: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="pin-screen" style="display: none;">
        <i data-lucide="shield-check" color="#d4af37" size="48" style="margin-bottom: 10px;"></i>
        <h2 id="pin-msg" style="margin-bottom: 30px; font-weight: 800; letter-spacing: -1px;">Enter Vault PIN</h2>
        <div class="pin-dot-container">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad">
            <div class="num-btn" onclick="pressNum('1')">1</div><div class="num-btn" onclick="pressNum('2')">2</div><div class="num-btn" onclick="pressNum('3')">3</div>
            <div class="num-btn" onclick="pressNum('4')">4</div><div class="num-btn" onclick="pressNum('5')">5</div><div class="num-btn" onclick="pressNum('6')">6</div>
            <div class="num-btn" onclick="pressNum('7')">7</div><div class="num-btn" onclick="pressNum('8')">8</div><div class="num-btn" onclick="pressNum('9')">9</div>
            <div class="num-btn" onclick="clearPin()"><i data-lucide="delete"></i></div>
            <div class="num-btn" onclick="pressNum('0')">0</div>
            <div class="num-btn" onclick="pressNum('X')"><i data-lucide="x"></i></div>
        </div>
    </div>

    <div id="auth-body" style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div style="width: 90%; max-width: 360px;">
            <i data-lucide="crown" size="60" color="#d4af37" style="margin-bottom: 20px;"></i>
            <h1 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 30px;">DocVault Luxe</h1>
            <button class="premium-btn" onclick="handleAuth()">Continue with Google</button>
        </div>
    </div>

    <div id="app-body">
        <nav class="navbar">
            <h2 style="color: var(--primary); font-weight: 800;">DV Luxe</h2>
            <div id="nav-initial" style="width:40px; height:40px; background:var(--card); border:1px solid var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-weight:800;">G</div>
        </nav>

        <section id="home-sec" class="section active">
            <div style="padding: 40px 20px; text-align: center; border: 2px dashed var(--primary); border-radius: 30px; margin-bottom: 25px;" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="upload-cloud" size="48" color="#d4af37"></i>
                <h3 style="margin-top:10px;">Secure New Files</h3>
                <input type="file" id="fileInput" hidden multiple onchange="handleMultipleUploads(event)">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);">
                    <p style="color:var(--gray); font-size:0.7rem;">VAULT SIZE</p>
                    <h2 style="color:var(--primary);">UNLIMITED</h2>
                </div>
                <div style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);">
                    <p style="color:var(--gray); font-size:0.7rem;">FILES</p>
                    <h2 id="fileCount">0</h2>
                </div>
            </div>
        </section>

        <section id="vault-sec" class="section">
            <h2 style="margin-bottom:20px;">Secured Assets</h2>
            <div id="fileContainer"></div>
        </section>

        <section id="profile-sec" class="section">
            <div class="settings-card" style="background:var(--card); border-radius:25px; border:1px solid var(--border); overflow:hidden;">
                <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;" onclick="showSupport()">
                    <span><i data-lucide="help-circle" size="18" style="vertical-align:middle; margin-right:10px;"></i> Help & Support</span>
                    <i data-lucide="chevron-right"></i>
                </div>
                <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;" onclick="logout()">
                    <span style="color:var(--accent);"><i data-lucide="log-out" size="18" style="vertical-align:middle; margin-right:10px;"></i> Logout</span>
                </div>
            </div>
        </section>

        <nav class="tab-bar">
            <div class="tab-btn active" onclick="switchTab('home-sec', this)"><i data-lucide="home"></i><span>Home</span></div>
            <div class="tab-btn" onclick="switchTab('vault-sec', this)"><i data-lucide="shield"></i><span>Vault</span></div>
            <div class="tab-btn" onclick="switchTab('profile-sec', this)"><i data-lucide="user"></i><span>Profile</span></div>
        </nav>
    </div>

    <div id="support-modal">
        <div class="modal-content">
            <i data-lucide="headphones" size="40" color="#d4af37" style="margin-bottom:15px;"></i>
            <h3 style="margin-bottom:10px;">Luxe Support</h3>
            <p style="color:var(--gray); font-size:0.8rem; margin-bottom:20px;">Contact the developer for any technical issues or ad placements.</p>
            <button class="premium-btn" onclick="window.location.href='mailto:gyanendrasingh77429@gmail.com'" style="margin-bottom:10px;">Email Gyanendra</button>
            <button style="background:transparent; color:var(--gray); border:none;" onclick="closeSupport()">Close</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://sazdnbsestnlwxogxnfd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemRuYnNlc3RubHd4b2d4bmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE0NzcsImV4cCI6MjA5MjQzNzQ3N30.erpQghV9yktpj1efrNMkgsTzY7ePJDYIZhU1E_3CHMs";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentPin = "";
        let savedPin = localStorage.getItem('vaultPin');

        // --- PIN LOGIC ---
        function pressNum(n) {
            if(n === 'X') { currentPin = ""; updateDots(); return; }
            if(currentPin.length < 4) currentPin += n;
            updateDots();
            if(currentPin.length === 4) checkPin();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if(i < currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        function checkPin() {
            if(!savedPin) {
                localStorage.setItem('vaultPin', currentPin);
                alert("PIN Set Successfully!");
                unlockApp();
            } else if(currentPin === savedPin) {
                unlockApp();
            } else {
                alert("Incorrect PIN!");
                currentPin = "";
                updateDots();
            }
        }

        function unlockApp() {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('app-body').style.display = 'block';
            loadFiles();
        }

        // --- NAVIGATION ---
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
        }

        function showSupport() { document.getElementById('support-modal').style.display = 'flex'; lucide.createIcons(); }
        function closeSupport() { document.getElementById('support-modal').style.display = 'none'; }

        // --- AUTH & FILES ---
        async function handleAuth() {
            await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function handleMultipleUploads(e) {
            const files = e.target.files;
            const { data: { user } } = await supabaseClient.auth.getUser();
            for(let f of files) {
                const path = `${user.id}/${Date.now()}_${f.name}`;
                await supabaseClient.storage.from('documents').upload(path, f);
            }
            loadFiles();
        }

        async function loadFiles() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.storage.from('documents').list(user.id);
            document.getElementById('fileCount').innerText = data.length;
            const container = document.getElementById('fileContainer');
            container.innerHTML = data.map(f => `
                <div class="file-card">
                    <div style="background:#262c36; padding:10px; border-radius:12px; color:var(--primary);">
                        <i data-lucide="file"></i>
                    </div>
                    <div style="flex:1" onclick="openFile('${f.name}')">
                        <p style="font-weight:700; font-size:0.9rem;">${f.name.split('_')[1] || f.name}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openFile(name) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.storage.from('documents').createSignedUrl(`${user.id}/${name}`, 3600);
            window.open(data.signedUrl, '_blank');
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                document.getElementById('auth-body').style.display = 'none';
                document.getElementById('pin-screen').style.display = 'flex';
                if(!savedPin) document.getElementById('pin-msg').innerText = "Set Your New PIN";
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
