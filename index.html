<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocVault Pro | By Gyanendra Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; 
            --text: #0f172a; --gray: #64748b; --border: #e2e8f0; --danger: #ef4444;
        }

        body.dark { 
            --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        /* --- AUTH --- */
        #auth-body { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; padding: 40px; background: var(--card); border-radius: 32px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }

        /* --- LAYOUT --- */
        #app-body { display: none; padding-bottom: 100px; }
        .navbar { position: sticky; top: 0; background: var(--card); padding: 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        .search-container { padding: 15px 20px; }
        .search-box { width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }

        /* --- TAB NAVIGATION --- */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .tab-item.active { color: var(--primary); }

        /* --- SECTIONS --- */
        .section { display: none; padding: 0 20px; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UPLOAD ZONE --- */
        .upload-card { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 30px; border-radius: 28px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); cursor: pointer; }
        
        /* --- FILE LIST --- */
        .file-item { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.2s; }
        .file-item:active { transform: scale(0.97); }
        .file-icon { width: 48px; height: 48px; background: #f1f5f9; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        body.dark .file-icon { background: #334155; }

        /* --- SETTINGS --- */
        .settings-group { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        .setting-row { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; }
        .setting-row:last-child { border: none; }

        /* --- BUTTONS --- */
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        .loading-spinner { animation: spin 1s linear infinite; display: none; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .delete-btn { color: var(--danger); padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-body">
        <div class="auth-card">
            <div style="width: 70px; height: 70px; background: #eef2ff; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: var(--primary);">
                <i data-lucide="lock" size="36"></i>
            </div>
            <h1 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;">DocVault Pro</h1>
            <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 30px;">Developed by <span style="color: var(--primary); font-weight: 700;">Gyanendra Singh</span></p>
            <button class="btn-primary" onclick="handleAuth()">Login with Google</button>
        </div>
    </div>

    <div id="app-body">
        <nav class="navbar">
            <div>
                <p style="font-size: 0.75rem; color: var(--gray); font-weight: 700;">WELCOME BACK,</p>
                <h2 id="userName" style="font-size: 1.2rem; font-weight: 800;">User</h2>
            </div>
            <div id="pfp" style="width: 45px; height: 45px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem;">G</div>
        </nav>

        <div class="search-container">
            <input type="text" id="fileSearch" class="search-box" placeholder="Search your files..." onkeyup="filterFiles()">
        </div>

        <section id="home-sec" class="section active">
            <div class="upload-card" onclick="document.getElementById('fileInput').click()">
                <div id="up-icon"><i data-lucide="cloud-upload" size="42"></i></div>
                <div id="up-loading" class="loading-spinner"><i data-lucide="refresh-cw" size="42"></i></div>
                <h3 style="margin-top: 10px; font-weight: 800;">Upload Files</h3>
                <p style="font-size: 0.8rem; opacity: 0.9;">Select multiple images or docs</p>
                <input type="file" id="fileInput" hidden multiple onchange="handleMultipleUploads(event)">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                <div class="stat-card" style="background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border);">
                    <p style="color: var(--gray); font-size: 0.7rem; font-weight: 800;">FILES SECURED</p>
                    <h2 id="fileCount" style="font-size: 1.8rem; font-weight: 800;">0</h2>
                </div>
                <div class="stat-card" style="background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border);">
                    <p style="color: var(--gray); font-size: 0.7rem; font-weight: 800;">STATUS</p>
                    <h2 style="font-size: 1.5rem; color: #10b981; font-weight: 800;">PRO</h2>
                </div>
            </div>
        </section>

        <section id="files-sec" class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-weight: 800;">My Vault</h2>
                <span id="refreshBtn" onclick="loadFiles()" style="color: var(--primary); font-size: 0.8rem; font-weight: 700; cursor: pointer;">Refresh</span>
            </div>
            <div id="fileContainer">
                </div>
        </section>

        <section id="settings-sec" class="section">
            <h2 style="margin-bottom: 20px; font-weight: 800;">Settings</h2>
            
            <div class="settings-group">
                <div class="setting-row" onclick="alert('Profile secure by Gyanendra Singh')">
                    <span style="font-weight: 600;"><i data-lucide="user" size="18" style="margin-right: 12px; vertical-align: middle;"></i> My Profile</span>
                    <i data-lucide="chevron-right" size="18" color="#94a3b8"></i>
                </div>
                <div class="setting-row" onclick="toggleDarkMode()">
                    <span style="font-weight: 600;"><i data-lucide="moon" size="18" style="margin-right: 12px; vertical-align: middle;"></i> Dark Mode</span>
                    <i data-lucide="toggle-right" size="24" color="#6366f1"></i>
                </div>
            </div>

            <div class="settings-group">
                <div class="setting-row" onclick="window.location.href='mailto:gyanendrasingh77429@gmail.com'">
                    <span style="font-weight: 600;"><i data-lucide="headphones" size="18" style="margin-right: 12px; vertical-align: middle;"></i> Support</span>
                </div>
                <div class="setting-row" style="color: var(--danger);" onclick="logout()">
                    <span style="font-weight: 600;"><i data-lucide="log-out" size="18" style="margin-right: 12px; vertical-align: middle;"></i> Logout</span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px; opacity: 0.5;">
                <p style="font-size: 0.7rem; font-weight: 800;">SECURED BY GYANENDRA SINGH</p>
                <p style="font-size: 0.6rem;">DocVault Engine v3.5.0</p>
            </div>
        </section>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab('home-sec', this)"><i data-lucide="home"></i><span>Home</span></div>
            <div class="tab-item" onclick="switchTab('files-sec', this)"><i data-lucide="folder-kanban"></i><span>Vault</span></div>
            <div class="tab-item" onclick="switchTab('settings-sec', this)"><i data-lucide="user-cog"></i><span>Account</span></div>
        </nav>
    </div>

    <script>
        const SB_URL = "https://sazdnbsestnlwxogxnfd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemRuYnNlc3RubHd4b2d4bmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE0NzcsImV4cCI6MjA5MjQzNzQ3N30.erpQghV9yktpj1efrNMkgsTzY7ePJDYIZhU1E_3CHMs";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- CORE FUNCTIONS ---
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            localStorage.setItem('docVaultDark', document.body.classList.contains('dark'));
        }

        // --- AUTH ---
        async function handleAuth() {
            await supabaseClient.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // --- MULTIPLE FILE UPLOAD ---
        async function handleMultipleUploads(e) {
            const files = e.target.files;
            if(!files.length) return;

            const upIcon = document.getElementById('up-icon');
            const upLoading = document.getElementById('up-loading');
            
            upIcon.style.display = 'none';
            upLoading.style.display = 'block';

            const { data: { user } } = await supabaseClient.auth.getUser();

            for (let file of files) {
                const path = `${user.id}/${Date.now()}_${file.name}`;
                const { error } = await supabaseClient.storage.from('documents').upload(path, file);
                if(error) console.error("Error uploading:", file.name);
            }

            upIcon.style.display = 'block';
            upLoading.style.display = 'none';
            alert(`Success! ${files.length} files uploaded.`);
            loadFiles();
        }

        // --- LOAD & SEARCH FILES ---
        let allFiles = [];
        async function loadFiles() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data, error } = await supabaseClient.storage.from('documents').list(user.id);
            
            if(!error) {
                allFiles = data;
                document.getElementById('fileCount').innerText = data.length;
                renderFiles(data);
            }
        }

        function renderFiles(files) {
            const container = document.getElementById('fileContainer');
            if(!files.length) {
                container.innerHTML = `<p style="text-align:center; padding:50px; color:var(--gray);">Empty Vault</p>`;
                return;
            }

            container.innerHTML = files.map(f => `
                <div class="file-item">
                    <div class="file-icon" onclick="openFile('${f.name}')">
                        <i data-lucide="${f.name.match(/\.(jpg|jpeg|png)$/i) ? 'image' : 'file-text'}"></i>
                    </div>
                    <div style="flex:1" onclick="openFile('${f.name}')">
                        <p style="font-weight:700; font-size:0.9rem; margin-bottom:2px;">${f.name.split('_')[1] || f.name}</p>
                        <p style="font-size:0.7rem; color:var(--gray);">Tap to open</p>
                    </div>
                    <div class="delete-btn" onclick="deleteFile('${f.name}')">
                        <i data-lucide="trash-2" size="18"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterFiles() {
            const query = document.getElementById('fileSearch').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query));
            renderFiles(filtered);
        }

        // --- OPEN & DELETE ---
        async function openFile(name) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data, error } = await supabaseClient.storage.from('documents').createSignedUrl(`${user.id}/${name}`, 3600);
            if(!error) window.open(data.signedUrl, '_blank');
        }

        async function deleteFile(name) {
            if(!confirm("Are you sure you want to delete this file?")) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { error } = await supabaseClient.storage.from('documents').remove([`${user.id}/${name}`]);
            if(!error) loadFiles();
            else alert("Delete failed!");
        }

        window.onload = async () => {
            if(localStorage.getItem('docVaultDark') === 'true') document.body.classList.add('dark');
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                document.getElementById('auth-body').style.display = 'none';
                document.getElementById('app-body').style.display = 'block';
                document.getElementById('userName').innerText = session.user.user_metadata.full_name;
                document.getElementById('pfp').innerText = session.user.user_metadata.full_name[0];
                loadFiles();
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
